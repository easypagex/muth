<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>👽 MU/TH/UR 6000</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #0a0805;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  .terminal-wrap {
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
  }

  /* ── HERO IMAGE CONTAINER ── */
  .hero-container {
    position: relative;
    width: 100%;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  .hero-img {
    width: 100%;
    display: block;
    position: relative;
    z-index: 1;
  }

  /* Light flash overlay — covers whole image */
  .flash-overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.05s;
    background:
      radial-gradient(ellipse at 16% 20%, rgba(255,210,80,0.95) 0%, transparent 18%),
      radial-gradient(ellipse at 30% 20%, rgba(255,200,70,0.85) 0%, transparent 16%),
      radial-gradient(ellipse at 44% 20%, rgba(255,210,80,0.95) 0%, transparent 18%),
      radial-gradient(ellipse at 57% 20%, rgba(255,200,70,0.85) 0%, transparent 16%),
      radial-gradient(ellipse at 70% 20%, rgba(255,210,80,0.95) 0%, transparent 18%),
      radial-gradient(ellipse at 83% 20%, rgba(255,200,70,0.85) 0%, transparent 16%),
      radial-gradient(ellipse at 14% 44%, rgba(255,190,50,0.75) 0%, transparent 14%),
      radial-gradient(ellipse at 14% 60%, rgba(255,190,50,0.7) 0%, transparent 14%),
      radial-gradient(ellipse at 14% 76%, rgba(255,190,50,0.75) 0%, transparent 14%),
      radial-gradient(ellipse at 86% 44%, rgba(255,190,50,0.75) 0%, transparent 14%),
      radial-gradient(ellipse at 86% 60%, rgba(255,190,50,0.7) 0%, transparent 14%),
      radial-gradient(ellipse at 86% 76%, rgba(255,190,50,0.75) 0%, transparent 14%),
      radial-gradient(ellipse at 50% 50%, rgba(255,240,180,0.08) 0%, transparent 70%);
    mix-blend-mode: screen;
  }
  .flash-overlay.on { opacity: 1; }

  /* CRT screen overlay — positioned over the monitor in the photo */
  .crt-screen {
    position: absolute;
    top: 33.5%;
    left: 18.5%;
    width: 63%;
    height: 37%;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
    border-radius: 10px 10px 18px 18px;
  }

  /* Scanline effect */
  .crt-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 4px
    );
    z-index: 2;
    pointer-events: none;
  }

  .screen-content {
    position: absolute;
    inset: 0;
    z-index: 1;
    padding: 8% 8%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .screen-text {
    font-family: 'VT323', monospace;
    font-size: clamp(7px, 2.1vw, 10.5px);
    color: #00ff41;
    text-shadow: 0 0 4px rgba(0,255,65,0.7), 0 0 10px rgba(0,255,65,0.3);
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: pre;
    text-align: center;
    max-width: 100%;
    overflow: hidden;
  }
  .screen-text.visible { opacity: 1; }

  /* Click hint */
  .click-hint {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(5px, 1.4vw, 7px);
    color: rgba(0,255,65,0.5);
    letter-spacing: 0.25em;
    white-space: nowrap;
    text-shadow: 0 0 6px rgba(0,255,65,0.4);
    animation: blink 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes blink { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .click-hint.hidden { display: none; }

  /* EasyPageX link */
  .site-link {
    display: block;
    text-align: center;
    padding: 18px;
    background: #060a06;
    font-family: 'VT323', monospace;
    font-size: clamp(13px, 4vw, 18px);
    color: rgba(0,255,65,0.6);
    text-decoration: none;
    letter-spacing: 0.2em;
    border-top: 1px solid rgba(0,255,65,0.1);
    border-bottom: 1px solid rgba(0,255,65,0.1);
    transition: color 0.2s;
  }
  .site-link:hover { color: #00ff41; text-shadow: 0 0 10px rgba(0,255,65,0.5); }
  .site-link span { color: rgba(255,176,0,0.7); }
</style>
</head>

<div class="terminal-wrap">

  <div class="hero-container" id="hero">
    <!-- PHOTOREALISTIC IMAGE -->
    <img class="hero-img" id="heroImg" src="" alt="MU/TH/UR 6000 Terminal">

    <div class="crt-screen">
      <div class="screen-content">
        <div class="screen-text" id="screenText"></div>
      </div>
    </div>

    <!-- CLICK HINT -->
    <div class="click-hint" id="clickHint">[ CLICK TO ACTIVATE ]</div>
  </div>

  <a class="site-link" href="https://easypagex.github.io/why/" target="_blank">

// ── AUDIO: Analog Servo Whine ──
function playServo() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  const ctx = new AC();
  const t = ctx.currentTime;

  // Main whine — sawtooth rising
  const o1 = ctx.createOscillator();
  const g1 = ctx.createGain();
  o1.type = 'sawtooth';
  o1.frequency.setValueAtTime(60, t);
  o1.frequency.exponentialRampToValueAtTime(2800, t + 0.38);
  o1.frequency.exponentialRampToValueAtTime(1400, t + 0.85);
  g1.gain.setValueAtTime(0, t);
  g1.gain.linearRampToValueAtTime(0.2, t + 0.04);
  g1.gain.linearRampToValueAtTime(0.13, t + 0.5);
  g1.gain.linearRampToValueAtTime(0, t + 0.9);
  o1.connect(g1); g1.connect(ctx.destination);
  o1.start(t); o1.stop(t + 0.9);

  // Harmonic layer
  const o2 = ctx.createOscillator();
  const g2 = ctx.createGain();
  o2.type = 'square';
  o2.frequency.setValueAtTime(120, t);
  o2.frequency.exponentialRampToValueAtTime(5200, t + 0.32);
  o2.frequency.exponentialRampToValueAtTime(2600, t + 0.72);
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(0.055, t + 0.04);
  g2.gain.linearRampToValueAtTime(0, t + 0.82);
  o2.connect(g2); g2.connect(ctx.destination);
  o2.start(t); o2.stop(t + 0.82);

  // Mechanical click
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(d.length*0.12));
  const ns = ctx.createBufferSource();
  const ng = ctx.createGain();
  const nf = ctx.createBiquadFilter();
  nf.type = 'bandpass'; nf.frequency.value = 900; nf.Q.value = 2;
  ns.buffer = buf;
  ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
  ng.gain.setValueAtTime(0.35, t);
  ng.gain.linearRampToValueAtTime(0, t + 0.05);
  ns.start(t);

  // Hum
  const o3 = ctx.createOscillator();
  const g3 = ctx.createGain();
  o3.type = 'sine'; o3.frequency.value = 60;
  g3.gain.setValueAtTime(0.09, t);
  g3.gain.linearRampToValueAtTime(0, t + 0.9);
  o3.connect(g3); g3.connect(ctx.destination);
  o3.start(t); o3.stop(t + 0.9);
}

let msgIdx = 0;
let animating = false;
let activated = false;

// ── LIGHT FLASH ──
function flashLights() {
  const fl = document.getElementById('flashOverlay');
  const steps = [1, 0, 1, 0, 0.7, 0];
  let s = 0;
  function next() {
    if (s >= steps.length) { fl.style.opacity = 0; fl.classList.remove('on'); return; }
    fl.classList.toggle('on', steps[s] > 0);
    fl.style.opacity = steps[s];
    s++;
    setTimeout(next, s <= 2 ? 75 : 110);
  }
  next();
}

// ── TYPEWRITER ON CRT ──
function typeText(lines) {
  const el = document.getElementById('screenText');
  el.textContent = '';
  el.classList.add('visible');
  let lineIdx = 0;
  let charIdx = 0;
  let text = '';

  function tick() {
    if (lineIdx >= lines.length) { animating = false; return; }
    const line = lines[lineIdx];
    if (charIdx <= line.length) {
      text = lines.slice(0, lineIdx).join('\n') + (lineIdx > 0 ? '\n' : '') + line.slice(0, charIdx) + (charIdx < line.length ? '_' : '');
      el.textContent = text;
      charIdx++;
      setTimeout(tick, 22);
    } else {
      lineIdx++;
      charIdx = 0;
      setTimeout(tick, 60);
    }
  }
  tick();
}

// ── CLICK ──
document.getElementById('hero').addEventListener('click', function() {
  if (animating) return;
  animating = true;

  if (!activated) {
    activated = true;
    document.getElementById('clickHint').classList.add('hidden');
  }

  playServo();
  flashLights();

  const msg = MSGS[msgIdx % MSGS.length];
  msgIdx++;
  const lines = msg.split('\n');

  setTimeout(() => typeText(lines), 160);
});
